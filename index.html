<!DOCTYPE html>
<html>
<body>

    <p id="subtraction"></p>

    <script>
    function subtract(a, b, c) {
        return a - b - c;
    }
        
    let result = subtract(7402, 350, 10000);

    document.getElementById("subtraction").innerHTML = "The answer is " + result;
    </script>
